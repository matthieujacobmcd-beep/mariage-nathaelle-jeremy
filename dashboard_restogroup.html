<style>
#login-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: #f0f2f5;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
.login-box {
  background: #fff; border-radius: 16px;
  box-shadow: 0 8px 40px rgba(0,0,0,.12);
  padding: 48px 40px; width: 360px; text-align: center;
}
.login-logo { margin-bottom: 24px; }
.login-logo img { height: 72px; border-radius: 12px; }
.login-title {
  font-size: 1.3rem; font-weight: 700; color: #1a1d2e;
  margin-bottom: 4px;
}
.login-sub { font-size: .85rem; color: #6b7280; margin-bottom: 32px; }
.login-box input[type=password] {
  width: 100%; padding: 12px 16px; border-radius: 8px;
  border: 1.5px solid #dde1ea; font-size: 1rem;
  outline: none; color: #1a1d2e;
  transition: border-color .2s;
  box-sizing: border-box; margin-bottom: 12px;
  letter-spacing: 2px;
}
.login-box input[type=password]:focus { border-color: #27ae60; }
.login-btn {
  width: 100%; padding: 12px; border-radius: 8px;
  background: #27ae60; color: #fff; border: none;
  font-size: 1rem; font-weight: 700; cursor: pointer;
  transition: background .2s;
}
.login-btn:hover { background: #1e8449; }
.login-error {
  color: #c0392b; font-size: .82rem; margin-top: 10px;
  min-height: 20px; font-weight: 600;
}
.login-footer { margin-top: 28px; font-size: .72rem; color: #9ca3af; }
</style>

<script>
// Hash SHA-256 du mot de passe (mot de passe jamais stocké en clair)
const PWD_HASH = 'bdbdfacdfbfa967adf88a260a45229f270b7b99d222cb3840e86728f1ae15565';
const SESSION_KEY = 'fpy_auth';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function checkPassword() {
  const input = document.getElementById('pwd-input').value;
  const hash  = await sha256(input);
  if (hash === PWD_HASH) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderTabs();
    renderMain();
  } else {
    const err = document.getElementById('login-error');
    err.textContent = 'Mot de passe incorrect';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
    setTimeout(() => err.textContent = '', 3000);
  }
}

window.addEventListener('DOMContentLoaded', () => {
  // Déjà authentifié dans cette session ?
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }
  // Soumettre avec Entrée
  document.getElementById('pwd-input')
    .addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });
});
</script>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --card2: #f5f6f8;
    --border: #dde1ea;
    --gold: #b8860b;
    --gold2: #d4a017;
    --red: #c0392b;
    --green: #1e8449;
    --blue: #1a6eb5;
    --purple: #6c3483;
    --text: #1a1d2e;
    --muted: #6b7280;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border-bottom: 2px solid var(--gold2);
    padding: 0 24px; height: 60px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.07);
  }
  .topbar-logo { font-size: 1.2rem; font-weight: 700; color: var(--gold); letter-spacing: .5px; }
  .topbar-logo span { color: var(--muted); font-weight: 400; font-size:.9rem; margin-left: 10px; }
  .topbar-date { font-size: .72rem; color: var(--muted); margin-left: 8px; }
  .topbar-controls { display: flex; gap: 10px; align-items: center; }
  select {
    background: var(--card2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 14px; border-radius: 6px; font-size: .85rem; cursor: pointer;
    transition: border-color .2s;
  }
  select:hover { border-color: var(--gold); }
  .compare-badge {
    background: #e8f0fe; color: var(--blue); border: 1px solid #c5d8ff;
    padding: 4px 10px; border-radius: 20px; font-size: .75rem; font-weight: 700;
    letter-spacing: .3px;
  }

  .resto-tabs {
    display: flex; gap: 6px; padding: 12px 24px; background: var(--card);
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .tab {
    padding: 5px 16px; border-radius: 20px; font-size: .8rem; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); color: var(--muted);
    transition: all .2s; letter-spacing: .3px;
  }
  .tab:hover { border-color: var(--gold2); color: var(--text); }
  .tab.active { background: var(--gold); color: #fff; border-color: var(--gold); }
  .tab.franchise { border-color: var(--purple); }
  .tab.franchise.active { background: var(--purple); color: #fff; }

  .main { padding: 20px 24px; max-width: 1600px; }

  .kpi-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 14px; margin-bottom: 20px;
  }
  .kpi-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; cursor: pointer; transition: border-color .2s, box-shadow .2s;
    position: relative; overflow: hidden;
  }
  .kpi-card:hover { border-color: var(--gold2); box-shadow: 0 2px 10px rgba(0,0,0,.08); }
  .kpi-card.selected { border-color: var(--gold); background: #fdf6e3; }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .kpi-card.cat-ca::before { background: var(--gold); }
  .kpi-card.cat-qsp::before { background: var(--blue); }
  .kpi-card.cat-rh::before { background: var(--green); }
  .kpi-card.cat-fin::before { background: var(--purple); }
  .kpi-card.cat-qual::before { background: var(--red); }

  .kpi-label { font-size: .72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
  .kpi-value { font-size: 1.5rem; font-weight: 700; color: var(--text); line-height: 1; }

  /* Compare mode card */
  .kpi-compare-row { display: flex; gap: 12px; margin-top: 6px; }
  .kpi-compare-col { flex: 1; }
  .kpi-compare-year { font-size: .65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
  .kpi-compare-val { font-size: 1.05rem; font-weight: 700; }
  .kpi-compare-val.y25 { color: var(--blue); }
  .kpi-compare-val.y26 { color: var(--gold); }
  .kpi-delta { font-size: .72rem; font-weight: 700; margin-top: 4px; }
  .kpi-delta.pos { color: var(--green); }
  .kpi-delta.neg { color: var(--red); }
  .kpi-delta.neu { color: var(--muted); }

  .kpi-badge {
    display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: .7rem; font-weight: 700;
    margin-top: 6px;
  }
  .badge-ok { background: #d5f5e3; color: var(--green); }
  .badge-warn { background: #fdebd0; color: #b7770d; }
  .badge-bad { background: #fadbd8; color: var(--red); }

  .detail-panel {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 20px;
    box-shadow: 0 2px 10px rgba(0,0,0,.06);
  }
  .detail-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }
  .detail-title { font-size: 1.1rem; font-weight: 700; color: var(--gold); }
  .period-btns { display: flex; gap: 6px; }
  .period-btn {
    padding: 4px 12px; border-radius: 6px; font-size: .78rem; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); color: var(--muted);
    background: transparent; transition: all .15s;
  }
  .period-btn.active { border-color: var(--gold); color: var(--gold); background: #fdf6e3; }

  .data-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  .data-table th {
    padding: 8px 10px; text-align: right; color: var(--muted); font-weight: 600;
    border-bottom: 2px solid var(--border); white-space: nowrap; font-size: .72rem;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .data-table th:first-child { text-align: left; }
  .data-table th.y25 { color: var(--blue); }
  .data-table th.y26 { color: var(--gold); }
  .data-table th.delta { color: var(--muted); font-style: italic; }
  .data-table td {
    padding: 7px 10px; text-align: right; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .data-table td:first-child { text-align: left; color: var(--muted); font-weight: 600; }
  .data-table tr:hover td { background: #f8f9ff; }
  .data-table .delta-pos { color: var(--green); font-weight: 600; }
  .data-table .delta-neg { color: var(--red); font-weight: 600; }

  .chart-wrap { height: 260px; margin-top: 16px; }

  .section-title {
    font-size: .8rem; font-weight: 700; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 12px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .no-data { color: var(--muted); font-size: .8rem; padding: 20px; text-align: center; }

  /* BOUTON FLOTTANT JOTFORM */
  .fab-container {
    position: fixed; bottom: 28px; right: 28px; z-index: 999;
    display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
  }
  .fab-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 20px; border-radius: 50px;
    font-size: .85rem; font-weight: 700; cursor: pointer;
    border: none; box-shadow: 0 4px 16px rgba(0,0,0,.18);
    transition: transform .15s, box-shadow .15s;
    text-decoration: none; white-space: nowrap;
  }
  .fab-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.22); }
  .fab-btn.primary { background: #27ae60; color: #fff; }
  .fab-btn.secondary { background: #1a6eb5; color: #fff; }

  /* MODAL JOTFORM */
  .jot-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,.5); align-items: center; justify-content: center;
  }
  .jot-overlay.open { display: flex; }
  .jot-modal {
    background: #fff; border-radius: 16px; overflow: hidden;
    width: 90%; max-width: 720px; max-height: 90vh;
    display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  .jot-modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; background: #27ae60; color: #fff;
  }
  .jot-modal-title { font-size: 1rem; font-weight: 700; }
  .jot-modal-close {
    background: rgba(255,255,255,.2); border: none; color: #fff;
    width: 32px; height: 32px; border-radius: 50%; font-size: 1.1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .jot-modal-close:hover { background: rgba(255,255,255,.35); }
  .jot-iframe-wrap { flex: 1; overflow: auto; }
  .jot-iframe-wrap iframe { width: 100%; min-height: 539px; border: none; display: block; }

  /* VUE COMPARATIVE PAR KPI */
  .kpiview-selector {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
  }
  .kpiview-btn {
    padding: 7px 14px; border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--card); color: var(--muted);
    font-size: .78rem; font-weight: 700; cursor: pointer;
    transition: all .15s;
  }
  .kpiview-btn:hover { border-color: var(--blue); color: var(--blue); }
  .kpiview-btn.kv-active { background: var(--blue); border-color: var(--blue); color: #fff; }
  .kpiview-btn.kv-active.cat-ca   { background: var(--gold); border-color: var(--gold); }
  .kpiview-btn.kv-active.cat-rh   { background: var(--green); border-color: var(--green); }
  .kpiview-btn.kv-active.cat-fin  { background: #6c3483; border-color: #6c3483; }
  .kpiview-btn.kv-active.cat-qual { background: #c0392b; border-color: #c0392b; }
  .kpiview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
    gap: 14px;
  }
  .kpiview-card {
    background: var(--card); border-radius: 14px; padding: 20px 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
    border-top: 4px solid var(--border);
    position: relative; transition: transform .15s, box-shadow .15s;
  }
  .kpiview-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.1); }
  .kpiview-rank {
    position: absolute; top: -13px; left: 14px;
    width: 26px; height: 26px; border-radius: 50%;
    background: #e5e7eb; color: #6b7280;
    font-size: .72rem; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.15);
  }
  .kpiview-rank.r1 { background: #f1c40f; color: #7d6608; }
  .kpiview-rank.r2 { background: #95a5a6; color: #fff; }
  .kpiview-rank.r3 { background: #e67e22; color: #fff; }
  .kpiview-resto {
    font-size: .72rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; margin-top: 2px;
  }
  .kpiview-value { font-size: 1.4rem; font-weight: 800; color: var(--text); margin-bottom: 8px; }
  .kpiview-bar-wrap { height: 5px; background: #e8eaed; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
  .kpiview-bar { height: 100%; border-radius: 3px; }
  .kpiview-year-sel {
    display: flex; gap: 6px; margin-bottom: 20px;
  }
  .kpiview-year-btn {
    padding: 5px 14px; border-radius: 16px; border: 1.5px solid var(--border);
    font-size: .78rem; font-weight: 700; cursor: pointer; background: var(--card); color: var(--muted);
  }
  .kpiview-year-btn.active { background: var(--text); border-color: var(--text); color: #fff; }

  @media (max-width: 700px) {
    .topbar { flex-wrap: wrap; height: auto; padding: 8px 12px; gap: 8px; }
    .main { padding: 12px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .fab-btn span.fab-label { display: none; }
  }
</style>
</head>

// ============================================================
// DATA HELPERS
// ============================================================
function getData(year) { return DASHBOARD_DATA[year] || {}; }

function calcAnnual(kpiId, resto, year) {
  const d = getData(year);
  if (!d[kpiId]) return null;
  const kpi = KPIs.find(k => k.id === kpiId);
  if (!kpi?.monthly) {
    const v = d[kpiId];
    // direct dict {resto: value}
    return v?.[resto] ?? null;
  }
  let sum = 0, count = 0;
  for (const m of MONTHS) {
    const v = d[kpiId]?.[m]?.[resto];
    if (v !== null && v !== undefined) { sum += v; count++; }
  }
  if (count === 0) return null;
  return AVG_KPIS.includes(kpiId) ? sum / count : sum;
}

// Dernier mois renseigné pour un KPI/année (au moins un restaurant non null)
function lastFilledMonth(kpiId, year) {
  const d = getData(year);
  if (!d[kpiId]) return null;
  let last = null;
  for (const m of MONTHS) {
    const monthData = d[kpiId][m];
    if (monthData && Object.values(monthData).some(v => v !== null && v !== undefined)) {
      last = m;
    }
  }
  return last;
}

// Mois communs renseignés entre 2025 et 2026 pour un KPI
function commonFilledMonths(kpiId) {
  const last25 = lastFilledMonth(kpiId, 2025);
  const last26 = lastFilledMonth(kpiId, 2026);
  const idx25  = last25 ? MONTHS.indexOf(last25) : -1;
  const idx26  = last26 ? MONTHS.indexOf(last26) : -1;
  const upTo   = Math.min(idx25, idx26);
  return upTo >= 0 ? MONTHS.slice(0, upTo + 1) : [];
}

// calcAnnual limité aux mois communs renseignés (mode comparaison)
function calcAnnualUpTo(kpiId, resto, year, months) {
  const d = getData(year);
  if (!d[kpiId]) return null;
  const kpi = KPIs.find(k => k.id === kpiId);
  if (!kpi?.monthly) return calcAnnual(kpiId, resto, year);
  let sum = 0, count = 0;
  for (const m of months) {
    const v = d[kpiId]?.[m]?.[resto];
    if (v !== null && v !== undefined) { sum += v; count++; }
  }
  if (count === 0) return null;
  return AVG_KPIS.includes(kpiId) ? sum / count : sum;
}

// KPIs qui ont un comparable à date (clé _comparable dans les données 2025)
const COMPARABLE_KPIS = new Set(['ca_total','ca_alim','tacs','pm','vphe']);

// Récupère la valeur comparable à date pour 2025 (mois partiel uniquement)
function getComparableVal(kpiId, resto, year, month) {
  if (year !== 2025 || !COMPARABLE_KPIS.has(kpiId)) return null;
  const meta = DASHBOARD_DATA.meta || {};
  const currentMonth = meta.current_month_2026;
  if (!currentMonth || month !== currentMonth) return null; // seulement pour le mois partiel
  const compKey = kpiId + '_comparable';
  return DASHBOARD_DATA['2025']?.[compKey]?.[month]?.[resto] ?? null;
}

// Label du cutoff pour affichage selon le restaurant
function getCutoffLabel(resto) {
  const meta = DASHBOARD_DATA.meta || {};
  const partial = meta.partial_by_resto || {};
  const r = (!resto || resto === 'FRANCHISE') ? null : resto;
  if (r && partial[r]) {
    const m = partial[r].month;
    const day = partial[r].day;
    return `au ${day} ${m.charAt(0)+m.slice(1).toLowerCase()}`;
  }
  // Vue franchise : cutoff minimum commun
  const fc = meta.franchise_cutoff || {};
  const months = MONTHS.filter(m => fc[m]);
  if (months.length === 0) return null;
  const lastM = months[months.length - 1];
  const d = new Date(fc[lastM]);
  return `au ${d.getDate()} ${lastM.charAt(0)+lastM.slice(1).toLowerCase()}`;
}

// Version modifiée de calcAnnual utilisant les données déjà agrégées au bon cutoff par resto
function calcAnnualComparable(kpiId, resto, year) {
  if (!COMPARABLE_KPIS.has(kpiId)) return calcAnnual(kpiId, resto, year);

  const meta = DASHBOARD_DATA.meta || {};
  const partial = meta.partial_by_resto || {};
  const compKey = kpiId + '_comparable';

  // Mois disponibles en 2026
  const months2026 = MONTHS.filter(m => {
    const md = DASHBOARD_DATA['2026']?.[kpiId]?.[m];
    return md && Object.values(md).some(v => v !== null && v !== undefined);
  });

  // Mois partiels : tout mois où au moins un resto a un cutoff
  const partialMonths = new Set(Object.values(partial).map(p => p.month));

  const d = getData(year);
  if (!d[kpiId]) return null;

  let sum = 0, count = 0;
  for (const m of months2026) {
    let v;
    if (year === 2025 && partialMonths.has(m)) {
      // Mois partiel → utiliser le comparable à date (existe pour tous les restos + franchise)
      const compVal = DASHBOARD_DATA['2025']?.[compKey]?.[m]?.[resto] ?? null;
      v = compVal !== null ? compVal : (d[kpiId]?.[m]?.[resto] ?? null);
    } else {
      v = d[kpiId]?.[m]?.[resto] ?? null;
    }
    if (v !== null && v !== undefined) { sum += v; count++; }
  }
  if (count === 0) return null;
  return AVG_KPIS.includes(kpiId) ? sum / count : sum;
}

function calcDelta(v1, v2, fmt_type) {
  if (v1 === null || v2 === null || v1 === undefined || v2 === undefined) return null;
  if (['euros','euros2','nb','nb2','sec'].includes(fmt_type)) return v2 - v1;
  return v2 - v1; // for pct types, raw diff
}

// ============================================================
// FORMAT
// ============================================================
function fmt(v, type) {
  if (v === null || v === undefined || (typeof v === 'number' && isNaN(v))) return '—';
  switch(type) {
    case 'euros':    return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v);
    case 'euros2':   return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(v);
    case 'pct':      return (v*100).toFixed(1)+'%';
    case 'pct_sat':  return (v*100).toFixed(1)+'%';
    case 'pct_qual': return (v>=1?100:(v*100)).toFixed(1)+'%';
    case 'note':     return v.toFixed(1)+'/5';
    case 'taux':     return (v*100).toFixed(1)+'%';
    case 'sec':      return Math.round(v)+' s';
    case 'nb':       return new Intl.NumberFormat('fr-FR').format(Math.round(v));
    case 'nb2':      return v.toFixed(1);
    default:         return v.toFixed(2);
  }
}

function fmtDelta(delta, type, kpiId, refVal) {
  if (delta === null || delta === undefined) return '—';
  const pos  = delta > 0;
  const zero = Math.abs(delta) < 0.0001;
  const status = kpiId ? deltaStatus(kpiId, delta) : (pos ? 'good' : 'bad');
  let str;
  switch(type) {
    case 'euros':    str = (pos?'+':'')+new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(delta); break;
    case 'euros2':   str = (pos?'+':'')+(delta).toFixed(2)+'€'; break;
    case 'pct':
    case 'pct_sat':
    case 'pct_qual':
    case 'taux':     str = (pos?'+':'')+(delta*100).toFixed(1)+'pt'; break;
    case 'note':     str = (pos?'+':'')+delta.toFixed(2); break;
    case 'sec':      str = (pos?'+':'')+Math.round(delta)+' s'; break;
    case 'nb':       str = (pos?'+':'')+new Intl.NumberFormat('fr-FR').format(Math.round(delta)); break;
    case 'nb2':      str = (pos?'+':'')+delta.toFixed(1); break;
    default:         str = (pos?'+':'')+delta.toFixed(2);
  }
  // Ajouter le % de variation si une valeur de référence est fournie (pour € et nb)
  let pctStr = '';
  if (refVal !== undefined && refVal !== null && refVal !== 0 &&
      ['euros','euros2','nb','nb2','sec'].includes(type)) {
    const pctVal = (delta / refVal) * 100;
    pctStr = ` (${pctVal>0?'+':''}${pctVal.toFixed(1)}%)`;
  }
  if (zero) return `<span style="display:inline-block;padding:2px 8px;border-radius:10px;background:#f0f0f0;color:var(--muted);font-size:.7rem;font-weight:600">= ${str.replace('+','')}</span>`;
  const bg  = status === 'good' ? '#d5f5e3' : '#fadbd8';
  const col = status === 'good' ? '#1e8449' : '#c0392b';
  return `<span style="display:inline-block;padding:2px 8px;border-radius:10px;background:${bg};color:${col};font-size:.7rem;font-weight:700">${pos?'▲':'▼'} ${str}${pctStr}</span>`;
}

// KPIs où une BAISSE est bonne (rouge si hausse, vert si baisse)
const LOWER_IS_BETTER = new Set(['oepe_annual','r2p_annual','oph_annual','turnover_annual','turnover_3m','pertes_annual','cout_mo','ecart_rendement_annual']);

// Retourne 'good', 'bad' ou 'neutral' selon le delta et le KPI
function deltaStatus(kpiId, delta) {
  if (delta === null || delta === undefined || Math.abs(delta) < 0.0001) return 'neutral';
  const positive = delta > 0;
  return (LOWER_IS_BETTER.has(kpiId) ? !positive : positive) ? 'good' : 'bad';
}

function getBadge(kpiId, v) {
  if (v === null || v === undefined) return '';
  let status;
  if      (kpiId === 'marge_annual' || kpiId === 'marge_fin')   status = v >= 0.76 ? 'ok' : v >= 0.74 ? 'warn' : 'bad';
  else if (kpiId === 'pac_annual'   || kpiId === 'pac_fin')     status = v >= 0.35 ? 'ok' : v >= 0.32 ? 'warn' : 'bad';
  else if (kpiId === 'resultat_net_annual' || kpiId === 'resultat_net') status = v >= 0 ? 'ok' : 'bad';
  else if (kpiId === 'cout_mo')      status = v <= 0.26 ? 'ok' : v <= 0.28 ? 'warn' : 'bad';
  else if (kpiId === 'hello_mcdo')              status = v >= 0.9  ? 'ok' : v >= 0.85 ? 'warn' : 'bad';
  else if (kpiId === 'reseau')                  status = v >= 3.3  ? 'ok' : v >= 3.0  ? 'warn' : 'bad';
  else if (kpiId === 'audit_merieux_annual' || kpiId === 'analyses_merieux_annual') status = v >= 0.95 ? 'ok' : v >= 0.85 ? 'warn' : 'bad';
  else if (kpiId === 'oepe' || kpiId === 'oepe_annual') status = v <= 300 ? 'ok' : v <= 360 ? 'warn' : 'bad';
  else if (kpiId === 'r2p'  || kpiId === 'r2p_annual')  status = v <= 300 ? 'ok' : v <= 360 ? 'warn' : 'bad';
  else if (kpiId === 'oph'  || kpiId === 'oph_annual')   status = v <= 30  ? 'ok' : v <= 50  ? 'warn' : 'bad';
  else if (kpiId === 'vphe' || kpiId === 'vphe_annual')  status = v >= 95  ? 'ok' : v >= 85  ? 'warn' : 'bad';
  else if (kpiId === 'turnover_annual' || kpiId === 'turnover_3m') status = v <= 0.8 ? 'ok' : v <= 1.2 ? 'warn' : 'bad';
  else if (kpiId === 'pertes_annual') {
    const r = currentResto === 'FRANCHISE' ? 'FRANCHISE' : currentResto;
    const obj = DASHBOARD_DATA[String(currentYear)]?.pertes_obj?.[r] ?? 0.006;
    status = v <= obj ? 'ok' : v <= obj * 1.2 ? 'warn' : 'bad';
  }
  else if (kpiId === 'ecart_rendement_annual') {
    const r = currentResto === 'FRANCHISE' ? 'FRANCHISE' : currentResto;
    const obj = DASHBOARD_DATA[String(currentYear)]?.ecart_rendement_obj?.[r] ?? 0.005;
    status = v <= obj ? 'ok' : v <= obj * 1.5 ? 'warn' : 'bad';
  }
  else return '';
  const labels = { ok:'✓ OK', warn:'⚠ Attention', bad:'✗ Alerte' };
  return `<span class="kpi-badge badge-${status}">${labels[status]}</span>`;
}

// ============================================================
// MODE
// ============================================================
function setMode(val) {
  compareMode = false;
  prevMode    = false;
  kpiViewMode = false;
  document.getElementById('compareBadge').style.display = 'none';
  document.getElementById('prevBadge').style.display    = 'none';
  document.getElementById('kpiBadge').style.display     = 'none';
  if (val === 'compare') {
    compareMode = true;
    document.getElementById('compareBadge').style.display = 'inline-block';
  } else if (val === 'prev') {
    prevMode = true;
    currentYear = 2026;
    document.getElementById('prevBadge').style.display = 'inline-block';
  } else if (val === 'kpiview') {
    kpiViewMode = true;
    currentYear = 2026;
    document.getElementById('kpiBadge').style.display = 'inline-block';
  } else {
    currentYear = parseInt(val);
  }
  currentKPI = null;
  renderTabs();
  renderMain();
}

function setResto(r) { currentResto = r; currentKPI = null; renderTabs(); renderMain(); }
function setPeriod(p) { currentPeriod = p; renderDetail(); }
function setKPI(id) { currentKPI = currentKPI === id ? null : id; renderMain(); }

// ============================================================
// RENDER TABS
// ============================================================
function renderTabs() {
  const el = document.getElementById('restoTabs');
  if (kpiViewMode) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  const tabs = ['FRANCHISE', ...RESTOS];
  el.innerHTML = tabs.map(r => {
    const cls = r === currentResto ? 'active' : '';
    const fr  = r === 'FRANCHISE' ? 'franchise' : '';
    const lbl = r === 'FRANCHISE' ? '📊 Vue Franchise' : r;
    return `<div class="tab ${cls} ${fr}" onclick="setResto('${r}')">${lbl}</div>`;
  }).join('');
}

// ============================================================
// RENDER MAIN
// ============================================================
// ============================================================
// VUE COMPARATIVE PAR KPI
// ============================================================
let kpiViewSelected = null;
let kpiViewYear = 2026;

function renderKpiView() {
  const el = document.getElementById('mainContent');
  // KPIs disponibles (avec valeur annuelle seulement)
  const viewableKpis = KPIs.filter(k => {
    const d = getData(kpiViewYear);
    return d[k.id] && Object.values(d[k.id]).some(v =>
      typeof v === 'object' ? Object.values(v).some(x => x !== null) : v !== null
    );
  });

  // Sélectionner le premier KPI par défaut
  if (!kpiViewSelected || !viewableKpis.find(k => k.id === kpiViewSelected)) {
    kpiViewSelected = viewableKpis[0]?.id || null;
  }

  // Sélecteur d'année
  let html = `<div class="kpiview-year-sel">
    <button class="kpiview-year-btn ${kpiViewYear===2026?'active':''}" onclick="setKpiViewYear(2026)">2026</button>
    <button class="kpiview-year-btn ${kpiViewYear===2025?'active':''}" onclick="setKpiViewYear(2025)">2025</button>
  </div>`;

  // Boutons KPI par catégorie
  for (const cat of ['ca','qsp','rh','fin','qual']) {
    const catKpis = viewableKpis.filter(k => k.cat === cat);
    if (!catKpis.length) continue;
    html += `<div style="font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;margin-top:14px">${CAT_LABELS[cat]}</div>`;
    html += `<div class="kpiview-selector">`;
    for (const kpi of catKpis) {
      const active = kpiViewSelected === kpi.id ? 'kv-active' : '';
      html += `<button class="kpiview-btn cat-${kpi.cat} ${active}" onclick="selectKpiView('${kpi.id}')">${kpi.label}</button>`;
    }
    html += `</div>`;
  }

  // Grille des restaurants pour le KPI sélectionné
  if (kpiViewSelected) {
    const kpi = KPIs.find(k => k.id === kpiViewSelected);
    html += `<div style="margin:20px 0 10px;font-size:.85rem;font-weight:700;color:var(--text)">
      Classement — ${kpi.label} <span style="color:var(--muted);font-weight:400">(${kpiViewYear})</span>
    </div>`;

    // Calculer la valeur pour chaque restaurant
    const d = getData(kpiViewYear);
    const values = [];
    for (const r of RESTOS) {
      let v;
      if (kpi.monthly || kpi.hasMonthly) {
        const monthlyId = kpi.hasMonthly || kpi.id;
        v = COMPARABLE_KPIS.has(kpi.id)
          ? calcAnnualComparable(kpi.id, r, kpiViewYear)
          : calcAnnual(kpi.id, r, kpiViewYear);
      } else {
        v = calcAnnual(kpi.id, r, kpiViewYear);
      }
      const vPrev = kpiViewYear === 2026
        ? (COMPARABLE_KPIS.has(kpi.id)
            ? calcAnnualComparable(kpi.id, r, 2025)
            : calcAnnual(kpi.id, r, 2025))
        : null;
      if (v !== null && v !== undefined) {
        values.push({ r, v, vPrev });
      }
    }

    // Trier : meilleur en premier selon le KPI
    const lowerBetter = LOWER_IS_BETTER.has(kpi.id);
    values.sort((a, b) => lowerBetter ? a.v - b.v : b.v - a.v);

    // Couleur de barre selon catégorie
    const barColors = { ca:'var(--gold)', qsp:'var(--blue)', rh:'var(--green)', fin:'#6c3483', qual:'var(--red)' };
    const barColor = barColors[kpi.cat] || 'var(--blue)';

    // Valeur max pour la barre
    const maxV = Math.max(...values.map(x => Math.abs(x.v)));

    html += `<div class="kpiview-grid">`;
    values.forEach(({ r, v, vPrev }, i) => {
      const rank = i + 1;
      const rankClass = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : '';
      const barPct = maxV > 0 ? Math.abs(v) / maxV * 100 : 0;
      const status = deltaStatus(kpi.id, v);
      const borderColor = status === 'ok' ? 'var(--green)' : status === 'warn' ? '#f39c12' : 'var(--red)';
      const delta = vPrev !== null && vPrev !== undefined ? calcDelta(vPrev, v, kpi.fmt) : null;
      const shortName = r === 'AIX LES BAINS' ? 'AIX' : r === 'LES ABRETS' ? 'ABRETS' : r;

      const canClickCard = kpi.monthly || kpi.hasMonthly;
      const cardonclick = canClickCard ? `onclick="setKpiViewResto('${r}')"` : '';
      const cardCursor  = canClickCard ? 'cursor:pointer' : '';

      html += `<div class="kpiview-card" style="border-top-color:${borderColor};${cardCursor}" ${cardonclick}>
        <div class="kpiview-rank ${rankClass}">${rank}</div>
        <div class="kpiview-resto">${shortName}</div>
        <div class="kpiview-value">${fmt(v, kpi.fmt)}</div>
        <div class="kpiview-bar-wrap">
          <div class="kpiview-bar" style="width:${barPct.toFixed(1)}%;background:${barColor}"></div>
        </div>
        ${delta !== null ? `<div class="kpiview-delta">${fmtDelta(delta, kpi.fmt, kpi.id, vPrev)}</div>` : ''}
        ${canClickCard ? `<div style="font-size:.65rem;color:var(--muted);margin-top:6px;text-align:right">Détail →</div>` : ''}
      </div>`;
    });
    html += `</div>`;
  }

  el.innerHTML = html;
}

function selectKpiView(kpiId) {
  kpiViewSelected = kpiId;
  renderKpiView();
}

function setKpiViewYear(y) {
  kpiViewYear = y;
  renderKpiView();
}

function setKpiViewResto(resto) {
  // Basculer sur le restaurant cliqué et ouvrir le détail
  currentResto = resto;
  currentYear  = kpiViewYear;
  currentKPI   = kpiViewSelected;
  // Quitter le mode kpiView pour afficher le détail
  kpiViewMode  = false;
  document.getElementById('kpiBadge').style.display = 'none';
  document.getElementById('modeSel').value = String(kpiViewYear);
  renderTabs();
  renderMain();
  // Ouvrir le panneau détail
  setTimeout(() => {
    const detailEl = document.getElementById('detailPanel');
    if (detailEl) {
      renderDetail();
      detailEl.style.display = 'block';
      detailEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, 50);
}

function renderMain() {
  const el = document.getElementById('mainContent');
  if (kpiViewMode) { renderKpiView(); return; }
  const resto = currentResto === 'FRANCHISE' ? 'FRANCHISE' : currentResto;
  let html = '';

  for (const cat of ['ca','qsp','rh','fin','qual']) {
    const kpis = KPIs.filter(k => k.cat === cat);
    html += `<div class="section-title">${CAT_LABELS[cat]}</div><div class="kpi-grid">`;

    for (const kpi of kpis) {
      const sel = currentKPI === kpi.id ? 'selected' : '';
      const hasPrevForKpi = !!DASHBOARD_DATA['2026']?.[kpi.id+'_prev'];
      const canClick = prevMode
        ? hasPrevForKpi
        : (kpi.monthly || kpi.id === 'turnover_annual' || kpi.id === 'turnover_3m' || kpi.hasMonthly);
      const onclick = canClick ? `onclick="setKPI('${kpi.id}')"` : '';
      const cursor  = canClick ? '' : 'style="cursor:default"';

      if (prevMode) {
        const r = (currentResto === 'FRANCHISE') ? 'FRANCHISE' : currentResto;
        const hasPrevData = !!DASHBOARD_DATA['2026']?.[kpi.id+'_prev'];
        if (!hasPrevData) {
          html += `<div class="kpi-card cat-${cat}" style="opacity:.45;cursor:default">
            <div class="kpi-label">${kpi.label}</div>
            <div style="font-size:.8rem;color:var(--muted);margin-top:12px">Non disponible en prévisionnel</div>
          </div>`;
          continue;
        }
        const prevSrc = DASHBOARD_DATA['2026'][kpi.id+'_prev'];
        const months = MONTHS.filter(m => prevSrc[m]?.[r] !== undefined && prevSrc[m]?.[r] !== null);
        let vPrev = 0, vReal = 0, count = 0;
        for (const m of months) {
          const pv = prevSrc[m]?.[r];
          const rv = getData(2026)[kpi.id]?.[m]?.[r];
          if (pv !== null && pv !== undefined) { vPrev += pv; count++; }
          if (rv !== null && rv !== undefined) vReal += rv;
        }
        if (count === 0) {
          html += `<div class="kpi-card cat-${cat}" style="opacity:.45;cursor:default">
            <div class="kpi-label">${kpi.label}</div>
            <div style="font-size:.8rem;color:var(--muted);margin-top:12px">Non disponible en prévisionnel</div>
          </div>`;
          continue;
        }
        const vPrevFinal = AVG_KPIS.includes(kpi.id) ? vPrev/count : vPrev;
        const vRealFinal = AVG_KPIS.includes(kpi.id) ? vReal/count : vReal;
        const lastM = months[months.length-1];
        const delta = calcDelta(vPrevFinal, vRealFinal, kpi.fmt);
        html += `<div class="kpi-card cat-${cat} ${sel}" ${onclick} ${cursor}>
          <div class="kpi-label">${kpi.label}</div>
          <div style="font-size:.65rem;color:var(--muted);margin-bottom:4px">jusqu'à ${lastM}</div>
          <div class="kpi-compare-row">
            <div class="kpi-compare-col">
              <div class="kpi-compare-year" style="color:#b8860b">Prévisionnel</div>
              <div class="kpi-compare-val" style="color:#b8860b">${fmt(vPrevFinal, kpi.fmt)}</div>
            </div>
            <div class="kpi-compare-col">
              <div class="kpi-compare-year">Réel 2026</div>
              <div class="kpi-compare-val y26">${fmt(vRealFinal, kpi.fmt)}</div>
            </div>
          </div>
          <div style="margin-top:6px">${fmtDelta(delta, kpi.fmt, kpi.id, vPrevFinal)}</div>
        </div>`;
      } else if (compareMode) {
        const r25 = currentResto === 'FRANCHISE' ? 'FRANCHISE' : currentResto;
        const months = kpi.monthly ? commonFilledMonths(kpi.id) : null;
        const cutoffM = (DASHBOARD_DATA.meta||{}).current_month_2026;
        // Pour les KPIs CA : utiliser comparable à date pour le mois partiel
        let v25;
        if (COMPARABLE_KPIS.has(kpi.id) && months) {
          v25 = calcAnnualComparable(kpi.id, r25, 2025);
        } else {
          v25 = months ? calcAnnualUpTo(kpi.id, r25, 2025, months) : calcAnnual(kpi.id, r25, 2025);
        }
        const v26 = COMPARABLE_KPIS.has(kpi.id)
          ? calcAnnualComparable(kpi.id, r25, 2026)
          : (months ? calcAnnualUpTo(kpi.id, r25, 2026, months) : calcAnnual(kpi.id, r25, 2026));
        const lastM = months ? months[months.length-1] : null;
        const cutoffLblCard = COMPARABLE_KPIS.has(kpi.id) ? getCutoffLabel(r25) : null;
        const delta = calcDelta(v25, v26, kpi.fmt);
        const status26 = deltaStatus(kpi.id, delta);
        html += `<div class="kpi-card cat-${cat} ${sel}" ${onclick} ${cursor}>
          <div class="kpi-label">${kpi.label}${currentResto === 'FRANCHISE' && (kpi.id === 'oepe' || kpi.id === 'r2p' || kpi.id === 'oepe_annual' || kpi.id === 'r2p_annual') ? ' <span style="font-size:.65rem;color:var(--blue);font-weight:700">🇫🇷 France</span>' : ''}</div>
          ${kpi.id === 'turnover_3m' ? `<div style="font-size:.65rem;color:var(--muted);margin-bottom:2px">25: ${(getData(2025).turnover_3m_label||[]).join('·')} / 26: ${(getData(2026).turnover_3m_label||[]).join('·')}</div>` : ''}
          ${lastM ? `<div style="font-size:.65rem;color:var(--muted);margin-bottom:4px">${cutoffLblCard ? cutoffLblCard+' vs 2025' : 'jusqu\'à '+lastM}</div>` : ''}
          <div class="kpi-compare-row">
            <div class="kpi-compare-col">
              <div class="kpi-compare-year">2025</div>
              <div class="kpi-compare-val y25">${fmt(v25, kpi.fmt)}</div>
            </div>
            <div class="kpi-compare-col">
              <div class="kpi-compare-year">2026</div>
              <div class="kpi-compare-val y26">${fmt(v26, kpi.fmt)}</div>
            </div>
          </div>
          <div style="margin-top:6px">${fmtDelta(delta, kpi.fmt, kpi.id, v25)}</div>
        </div>`;
      } else {
        const r = currentResto === 'FRANCHISE' ? 'FRANCHISE' : currentResto;
        const v = COMPARABLE_KPIS.has(kpi.id)
          ? calcAnnualComparable(kpi.id, r, currentYear)
          : calcAnnual(kpi.id, r, currentYear);
        // Pour les KPIs mensuels : comparer les mêmes mois N-1 (à date)
        let vPrev;
        if (kpi.monthly) {
          vPrev = COMPARABLE_KPIS.has(kpi.id)
            ? calcAnnualComparable(kpi.id, r, currentYear - 1)
            : (() => {
                const months = lastFilledMonth(kpi.id, currentYear)
                  ? MONTHS.slice(0, MONTHS.indexOf(lastFilledMonth(kpi.id, currentYear)) + 1)
                  : MONTHS;
                return calcAnnualUpTo(kpi.id, r, currentYear - 1, months);
              })();
        } else {
          vPrev = calcAnnual(kpi.id, r, currentYear - 1);
        }
        const delta = calcDelta(vPrev, v, kpi.fmt);
        // Label cutoff pour mois partiel
        const cutoffLabel = COMPARABLE_KPIS.has(kpi.id) && currentYear === 2026 ? getCutoffLabel(r) : null;
        html += `<div class="kpi-card cat-${cat} ${sel}" ${onclick} ${cursor}>
          <div class="kpi-label">${kpi.label}${currentResto === 'FRANCHISE' && (kpi.id === 'oepe' || kpi.id === 'r2p' || kpi.id === 'oepe_annual' || kpi.id === 'r2p_annual') ? ' <span style="font-size:.65rem;color:var(--blue);font-weight:700">🇫🇷 France</span>' : ''}</div>
          ${kpi.id === 'turnover_3m' ? `<div style="font-size:.65rem;color:var(--muted);margin-bottom:4px">${(getData(currentYear).turnover_3m_label||[]).join(' · ') || ''}</div>` : ''}
          ${(() => {
            const lastM = lastFilledMonth(kpi.id, currentYear);
            if (!lastM || !kpi.monthly) return '';
            // Vérifier si le mois est partiel (pas décembre = année incomplète en cours)
            const isPartialYear = lastM !== 'DÉCEMBRE';
            if (cutoffLabel) return `<div style="font-size:.65rem;color:var(--muted);margin-bottom:2px">${cutoffLabel} vs ${currentYear-1}</div>`;
            if (isPartialYear) return `<div style="font-size:.65rem;color:var(--muted);margin-bottom:2px">jusqu'à ${lastM} vs ${currentYear-1}</div>`;
            return `<div style="font-size:.65rem;color:var(--muted);margin-bottom:2px">${currentYear} vs ${currentYear-1}</div>`;
          })()}
          <div class="kpi-value">${fmt(v, kpi.fmt)}</div>
          <div style="margin-top:6px">${fmtDelta(delta, kpi.fmt, kpi.id, vPrev)}</div>
          ${getBadge(kpi.id, v)}
        </div>`;
      }
    }
    html += `</div>`;
  }

  el.innerHTML = html;
  if (currentKPI) { renderDetail(); setTimeout(initChart, 50); }
}

function renderTurnoverMini() {
  const d = getData(currentYear);
  const to = d.turnover;
  if (!to) return '';
  const r = currentResto === 'FRANCHISE' ? 'CHAMBERY' : currentResto;
  return `<div style="margin-top:8px;display:flex;gap:12px">` +
    Object.keys(to).sort().map(y => {
      const v = to[y]?.[r];
      return `<div style="font-size:.72rem"><span style="color:var(--muted)">${y}</span> <b>${v!=null?(v*100).toFixed(0)+'%':'—'}</b></div>`;
    }).join('') + `</div>`;
}

// ============================================================
// DETAIL PANEL
// ============================================================
function renderDetail() {
  const existing = document.getElementById('kpiDetail');
  if (existing) existing.remove();
  if (!currentKPI) return;

  const kpi = KPIs.find(k => k.id === currentKPI);
  if (!kpi) return;

  const el = document.getElementById('mainContent');
  const div = document.createElement('div');
  div.id = 'kpiDetail';
  div.className = 'detail-panel';

  let periodBtns = '';
  if ((kpi.monthly || kpi.hasMonthly) && !prevMode) {
    periodBtns = `<div class="period-btns">
      <button class="period-btn ${currentPeriod==='annuel'?'active':''}" onclick="setPeriod('annuel')">Annuel</button>
      <button class="period-btn ${currentPeriod==='mensuel'?'active':''}" onclick="setPeriod('mensuel')">Mensuel</button>
    </div>`;
  }

  const modeLabel = prevMode ? 'Prévisionnel vs Réel 2026' : (compareMode ? '2025 vs 2026' : currentYear);
  const franceMention = currentResto === 'FRANCHISE' && (currentKPI === 'oepe' || currentKPI === 'r2p')
    ? ' <span style="font-size:.8rem;color:var(--blue);font-weight:700">🇫🇷 Référence France</span>' : '';
  div.innerHTML = `
    <div class="detail-header">
      <div class="detail-title">${kpi.label}${franceMention} — ${currentResto} <span style="font-size:.8rem;color:var(--muted);font-weight:400">(${modeLabel})</span></div>
      ${periodBtns}
    </div>
    <div id="detailBody"></div>
    <div class="chart-wrap"><canvas id="kpiChart"></canvas></div>
  `;
  el.insertBefore(div, el.firstChild);
  populateDetail();
  setTimeout(initChart, 30);
}

function populateDetail() {
  const kpi = KPIs.find(k => k.id === currentKPI);
  const body = document.getElementById('detailBody');
  if (!body || !kpi) return;

  if (!kpi.monthly && !kpi.hasMonthly) {
    body.innerHTML = '<div class="no-data">Données annuelles uniquement</div>';
    return;
  }

  // ── MODE PRÉVISIONNEL ────────────────────────────────────────────────
  if (prevMode) {
    const prevSrc = DASHBOARD_DATA['2026']?.[kpi.id+'_prev'];
    if (!prevSrc) {
      body.innerHTML = '<div class="no-data">Non disponible en prévisionnel</div>';
      return;
    }
    const restosP = currentResto === 'FRANCHISE' ? RESTOS : [currentResto];
    const monthsP = MONTHS.filter(m => Object.values(prevSrc[m] || {}).some(v => v !== null && v !== undefined));

    let html = `<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Mois</th>`;
    for (const r of restosP) {
      const short = r === 'AIX LES BAINS' ? 'AIX' : r === 'LES ABRETS' ? 'ABRETS' : r;
      html += `<th style="color:#b8860b">${short} Prév</th><th>${short} Réel</th><th class="delta">Δ</th>`;
    }
    html += `</tr></thead><tbody>`;
    for (const m of monthsP) {
      html += `<tr><td>${m}</td>`;
      for (const r of restosP) {
        const vp = prevSrc[m]?.[r] ?? null;
        const vr = getData(2026)[kpi.id]?.[m]?.[r] ?? null;
        const d  = calcDelta(vp, vr, kpi.fmt);
        html += `<td style="color:#b8860b">${fmt(vp,kpi.fmt)}</td><td>${fmt(vr,kpi.fmt)}</td><td>${fmtDelta(d,kpi.fmt,kpi.id,vp)}</td>`;
      }
      html += `</tr>`;
    }
    html += `</tbody></table></div>`;
    body.innerHTML = html;
    return;
  }

  // Pour pertes : utiliser pertes_monthly comme source de données mensuelles
  const monthlyId = kpi.hasMonthly || kpi.id;

  const restos = currentResto === 'FRANCHISE' ? RESTOS : [currentResto];

  if (currentPeriod === 'annuel') {
    let html = `<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Restaurant</th>`;
    if (compareMode) {
      html += `<th class="y25">2025</th><th class="y26">2026</th><th class="delta">Évolution</th>`;
    } else {
      html += `<th>${currentYear}</th><th>${currentYear-1}</th><th class="delta">Évol.</th>`;
    }
    html += `</tr></thead><tbody>`;

    for (const r of restos) {
      if (compareMode) {
        const v25 = COMPARABLE_KPIS.has(kpi.id)
          ? calcAnnualComparable(kpi.id, r, 2025)
          : calcAnnual(kpi.id, r, 2025);
        const v26 = COMPARABLE_KPIS.has(kpi.id)
          ? calcAnnualComparable(kpi.id, r, 2026)
          : calcAnnual(kpi.id, r, 2026);
        const d = calcDelta(v25, v26, kpi.fmt);
        html += `<tr><td>${r}</td><td>${fmt(v25,kpi.fmt)}</td><td>${fmt(v26,kpi.fmt)}</td><td>${fmtDelta(d,kpi.fmt,kpi.id)}</td></tr>`;
      } else {
        const vc = calcAnnual(kpi.id, r, currentYear);
        const vp = COMPARABLE_KPIS.has(kpi.id) && currentYear === 2026
          ? calcAnnualComparable(kpi.id, r, currentYear - 1)
          : calcAnnual(kpi.id, r, currentYear - 1);
        const d  = calcDelta(vp, vc, kpi.fmt);
        html += `<tr><td>${r}</td><td>${fmt(vc,kpi.fmt)}</td><td>${fmt(vp,kpi.fmt)}</td><td>${fmtDelta(d,kpi.fmt,kpi.id)}</td></tr>`;
      }
    }
    html += `</tbody></table></div>`;
    body.innerHTML = html;

    } else {
    // Monthly table
    const meta = DASHBOARD_DATA.meta || {};
    const cutoffM = meta.current_month_2026;
    const cutoffLbl = getCutoffLabel();
    let html = `<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Mois</th>`;
    if (compareMode) {
      for (const r of restos) {
        const short = r === 'AIX LES BAINS' ? 'AIX' : r === 'LES ABRETS' ? 'ABRETS' : r;
        html += `<th class="y25">${short} 25</th><th class="y26">${short} 26</th><th class="delta">Δ</th>`;
      }
    } else {
      for (const r of restos) {
        const short = r === 'AIX LES BAINS' ? 'AIX' : r === 'LES ABRETS' ? 'ABRETS' : r;
        html += `<th>${short} ${currentYear}</th><th style="color:var(--muted)">${short} ${currentYear-1}</th><th class="delta">Δ</th>`;
      }
    }
    html += `</tr></thead><tbody>`;

    for (const m of (compareMode ? commonFilledMonths(monthlyId) : MONTHS)) {
      const partial = (DASHBOARD_DATA.meta || {}).partial_by_resto || {};
      // Un mois est partiel si au moins un resto a ce mois comme mois partiel
      const isPartialMonth = Object.values(partial).some(p => p.month === m);
      const partialLabel = (() => {
        if (!isPartialMonth || !COMPARABLE_KPIS.has(monthlyId)) return '';
        const fc = (DASHBOARD_DATA.meta || {}).franchise_cutoff || {};
        const dateStr = fc[m];
        if (!dateStr) return '';
        const dt = new Date(dateStr);
        return `au ${dt.getDate()} ${m.charAt(0)+m.slice(1).toLowerCase()}`;
      })();
      const isPartialForResto = (r) => COMPARABLE_KPIS.has(monthlyId) &&
        ((partial[r] && partial[r].month === m) ||
         (r === 'FRANCHISE' && isPartialMonth));
      html += `<tr><td>${m}${partialLabel ? `<br><span style="font-size:.65rem;color:var(--blue)">${partialLabel}</span>` : ''}</td>`;
      for (const r of restos) {
        if (compareMode) {
          const v25 = isPartialForResto(r)
            ? (DASHBOARD_DATA['2025']?.[monthlyId+'_comparable']?.[m]?.[r] ?? null)
            : (getData(2025)[monthlyId]?.[m]?.[r] ?? null);
          const v26 = getData(2026)[monthlyId]?.[m]?.[r] ?? null;
          const d   = calcDelta(v25, v26, kpi.fmt);
          html += `<td>${fmt(v25,kpi.fmt)}</td><td>${fmt(v26,kpi.fmt)}</td><td>${fmtDelta(d,kpi.fmt,kpi.id)}</td>`;
        } else {
          const v = getData(currentYear)[monthlyId]?.[m]?.[r] ?? null;
          let vPrev;
          if (currentYear === 2026 && isPartialForResto(r)) {
            vPrev = DASHBOARD_DATA['2025']?.[monthlyId+'_comparable']?.[m]?.[r] ?? null;
          } else {
            vPrev = getData(currentYear-1)[monthlyId]?.[m]?.[r] ?? null;
          }
          const dv = calcDelta(vPrev, v, kpi.fmt);
          html += `<td>${fmt(v,kpi.fmt)}</td><td style="color:var(--muted)">${fmt(vPrev,kpi.fmt)}</td><td>${fmtDelta(dv,kpi.fmt,kpi.id)}</td>`;
        }
      }
      html += `</tr>`;
    }
    html += `</tbody></table></div>`;
    body.innerHTML = html;
  }
}

// ============================================================
// CHART
// ============================================================
let chartInst = null;
function initChart() {
  const canvas = document.getElementById('kpiChart');
  if (!canvas) return;
  const kpi = KPIs.find(k => k.id === currentKPI);
  if (!kpi?.monthly && !kpi?.hasMonthly) { canvas.parentElement.style.display='none'; return; }
  canvas.parentElement.style.display='block';
  const monthlyId = kpi.hasMonthly || kpi.id;

  if (chartInst) { chartInst.destroy(); chartInst = null; }

  const restos = currentResto === 'FRANCHISE' ? RESTOS : [currentResto];
  const colors25 = ['#1a6eb5','#1e8449','#6c3483','#c0392b','#d4621a','#0e7c7c','#c2185b','#795548'];
  const colors26 = ['#f5a500','#27ae60','#9b59b6','#e74c3c','#e67e22','#16a085','#e91e63','#a1887f'];

  let datasets = [];

  if (prevMode) {
    const prevSrc = DASHBOARD_DATA['2026']?.[kpi.id+'_prev'];
    if (!prevSrc) { canvas.parentElement.style.display='none'; return; }
    const months = MONTHS.filter(m => Object.values(prevSrc[m] || {}).some(v => v !== null && v !== undefined));
    const labels = months.map(m => MONTH_SHORT[MONTHS.indexOf(m)]);
    restos.forEach((r, i) => {
      datasets.push({
        label: `${r} Prévisionnel`,
        data: months.map(m => prevSrc[m]?.[r] ?? null),
        borderColor: '#d4a017',
        backgroundColor: 'transparent',
        borderDash: [5,3], tension: 0.3, pointRadius: 3, borderWidth: 2, spanGaps: true,
      });
      datasets.push({
        label: `${r} Réel`,
        data: months.map(m => getData(2026)[kpi.id]?.[m]?.[r] ?? null),
        borderColor: colors26[i % colors26.length],
        backgroundColor: 'transparent',
        tension: 0.3, pointRadius: 3, borderWidth: 2, spanGaps: true,
      });
    });
    chartInst = new Chart(canvas, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#6b7280', font: { size: 11 }, boxWidth: 12 } },
          tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.raw, kpi.fmt)}` } }
        },
        scales: {
          x: { grid: { color: '#e8eaed' }, ticks: { color: '#6b7280', font: { size: 10 } } },
          y: { grid: { color: '#e8eaed' }, ticks: { color: '#6b7280', font: { size: 10 }, callback: v => fmt(v, kpi.fmt) } }
        }
      }
    });
  } else if (compareMode) {
    const months = commonFilledMonths(monthlyId || kpi.id);
    const labels = months.map(m => MONTH_SHORT[MONTHS.indexOf(m)]);
    restos.forEach((r, i) => {
      datasets.push({
        label: `${r} 2025`,
        data: months.map(m => getData(2025)[monthlyId || kpi.id]?.[m]?.[r] ?? null),
        borderColor: colors25[i % colors25.length],
        backgroundColor: 'transparent',
        borderDash: [5,3], tension: 0.3, pointRadius: 3, borderWidth: 2, spanGaps: true,
      });
      datasets.push({
        label: `${r} 2026`,
        data: months.map(m => getData(2026)[monthlyId || kpi.id]?.[m]?.[r] ?? null),
        borderColor: colors26[i % colors26.length],
        backgroundColor: 'transparent',
        tension: 0.3, pointRadius: 3, borderWidth: 2, spanGaps: true,
      });
    });
    chartInst = new Chart(canvas, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#6b7280', font: { size: 11 }, boxWidth: 12 } },
          tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.raw, kpi.fmt)}` } }
        },
        scales: {
          x: { grid: { color: '#e8eaed' }, ticks: { color: '#6b7280', font: { size: 10 } } },
          y: { grid: { color: '#e8eaed' }, ticks: { color: '#6b7280', font: { size: 10 }, callback: v => fmt(v, kpi.fmt) } }
        }
      }
    });
  } else {
    datasets = restos.map((r, i) => ({
      label: r,
      data: MONTHS.map(m => getData(currentYear)[monthlyId || kpi.id]?.[m]?.[r] ?? null),
      borderColor: colors25[i % colors25.length],
      backgroundColor: colors25[i % colors25.length] + '18',
      tension: 0.3, pointRadius: 3, borderWidth: 2, spanGaps: true,
    }));
    chartInst = new Chart(canvas, {
      type: 'line',
      data: { labels: MONTH_SHORT, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#6b7280', font: { size: 11 }, boxWidth: 12 } },
          tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.raw, kpi.fmt)}` } }
        },
        scales: {
          x: { grid: { color: '#e8eaed' }, ticks: { color: '#6b7280', font: { size: 10 } } },
          y: { grid: { color: '#e8eaed' }, ticks: { color: '#6b7280', font: { size: 10 }, callback: v => fmt(v, kpi.fmt) } }
        }
      }
    });
  }
}

renderTabs();
renderMain();

// ── Date de mise à jour ──────────────────────────────────────
(function() {
  const meta = DASHBOARD_DATA.meta || {};
  const el = document.getElementById('updateDate');
  if (!el) return;

  // Priorité : date d'import, sinon dernier jour des données
  if (meta.import_date) {
    const dt = new Date(meta.import_date);
    const label = dt.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
    el.textContent = '— Mise à jour le ' + label;
  } else {
    const lastDays = meta.last_day_2026 || {};
    let lastDate = null;
    for (const d of Object.values(lastDays)) {
      const dt = new Date(d);
      if (!lastDate || dt > lastDate) lastDate = dt;
    }
    if (lastDate) {
      el.textContent = '— Données au ' + lastDate.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
    }
  }

  // ── Logo dans l'écran de login ───────────────────────────────
  const loginLogo = document.querySelector('.login-logo');
  if (loginLogo) {
    const topbarImg = document.querySelector('.topbar-logo img');
    if (topbarImg) {
      loginLogo.innerHTML = `<img src="${topbarImg.src}" style="height:72px;width:72px;object-fit:cover;border-radius:12px">`;
    }
  }
})();
